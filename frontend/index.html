<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GetTokens</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <!-- Splash screen shown while backend starts -->
    <div id="splash" class="screen active">
      <div class="logo">
        <svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="64" height="64" rx="16" fill="#6366f1"/>
          <path d="M20 20h10v10H20zM34 20h10v10H34zM20 34h10v10H20zM34 34h10v10H34z" fill="white" opacity="0.9"/>
        </svg>
      </div>
      <h1 class="app-name">GetTokens</h1>
      <div class="spinner-wrap">
        <div class="spinner"></div>
        <p id="splash-msg" class="splash-msg">正在启动后端服务…</p>
      </div>
    </div>

    <!-- Main screen shown once backend is ready -->
    <div id="main" class="screen">
      <!-- Traffic light spacer for macOS titlebar -->
      <div class="titlebar-drag"></div>

      <div class="sidebar">
        <nav>
          <a href="#" class="nav-item active" data-page="status">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
            状态
          </a>
          <a href="#" class="nav-item" data-page="settings">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
            设置
          </a>
        </nav>

        <div class="sidebar-footer">
          <span id="client-version" class="version-tag">v0.0.0</span>
        </div>
      </div>

      <div class="content">
        <!-- Status page -->
        <div id="page-status" class="page active">
          <header class="page-header">
            <h2>后端状态</h2>
            <div id="status-badge" class="badge badge-starting">启动中</div>
          </header>

          <div class="cards">
            <div class="card">
              <div class="card-label">运行状态</div>
              <div id="stat-status" class="card-value">—</div>
            </div>
            <div class="card">
              <div class="card-label">监听端口</div>
              <div id="stat-port" class="card-value">—</div>
            </div>
            <div class="card">
              <div class="card-label">运行时长</div>
              <div id="stat-uptime" class="card-value">—</div>
            </div>
            <div class="card">
              <div class="card-label">客户端版本</div>
              <div id="stat-version" class="card-value">—</div>
            </div>
          </div>

          <div class="section-title">API 连通性</div>
          <div id="healthz-result" class="healthz-box">
            <span class="dot dot-idle"></span>
            <span>等待后端就绪…</span>
          </div>

          <button id="btn-check-update" class="btn btn-secondary mt-4">检查更新</button>
          <div id="update-info" class="update-info hidden"></div>
        </div>

        <!-- Settings page -->
        <div id="page-settings" class="page">
          <header class="page-header">
            <h2>设置</h2>
          </header>
          <p class="placeholder-text">更多设置功能即将推出…</p>
        </div>
      </div>
    </div>

    <!-- Update banner -->
    <div id="update-banner" class="update-banner hidden">
      <span>🎉 发现新版本 <strong id="update-version"></strong></span>
      <button id="btn-apply-update" class="btn btn-primary btn-sm">立即更新</button>
      <button id="btn-dismiss-update" class="btn btn-ghost btn-sm">稍后</button>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
