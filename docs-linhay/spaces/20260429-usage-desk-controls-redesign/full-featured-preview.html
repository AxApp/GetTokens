<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GetTokens - Usage Analytics Pro Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-main: #ffffff;
            --bg-surface: #f9f9f9;
            --border-color: #000000;
            --text-primary: #000000;
            --text-muted: #666666;
            --accent-red: #ff0000;
            --shadow-color: #e5e5e5;
            --font-mono: 'JetBrains Mono', 'IBM Plex Mono', ui-monospace, monospace;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-main: #000000;
                --bg-surface: #111111;
                --border-color: #ffffff;
                --text-primary: #ffffff;
                --text-muted: #888888;
                --accent-red: #ff3333;
                --shadow-color: #222222;
            }
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            font-family: var(--font-mono);
            padding: 4rem;
        }

        .console-panel {
            border: 2px solid var(--border-color);
            background: var(--bg-main);
            box-shadow: 6px 6px 0px 0px var(--shadow-color);
        }

        /* 顶部状态条 */
        .console-status-bar {
            border-bottom: 2px solid var(--border-color);
            padding: 0.5rem 1rem;
            background: var(--bg-surface);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 9px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background: #0d9f4f;
            border-radius: 50%;
        }

        /* 操作按钮组 */
        .action-group {
            display: flex;
            gap: 0;
            border: 1px solid var(--border-color);
        }

        .action-btn {
            padding: 0.25rem 0.75rem;
            font-size: 9px;
            font-weight: 900;
            text-transform: uppercase;
            background: var(--bg-main);
            border-left: 1px solid var(--border-color);
            transition: all 100ms;
        }

        .action-btn:hover {
            background: var(--text-primary);
            color: var(--bg-main);
        }

        /* 核心控制条 */
        .console-controls {
            display: flex;
            flex-wrap: wrap;
            border-bottom: 2px solid var(--border-color);
        }

        .segmented-control {
            display: flex;
            flex: 1;
            min-width: 300px;
        }

        .segment {
            flex: 1;
            text-align: center;
            padding: 0.75rem 0;
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-right: 2px solid var(--border-color);
            cursor: pointer;
            transition: all 75ms;
        }

        .segment.active {
            background: var(--text-primary);
            color: var(--bg-main);
        }

        .segment:not(.active):hover {
            background: var(--bg-surface);
        }

        /* 度量指标切换 */
        .metric-switcher {
            display: flex;
            background: var(--bg-muted);
            padding: 4px;
            gap: 4px;
        }

        .metric-btn {
            padding: 0.5rem 1rem;
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            border: 2px solid transparent;
            transition: all 100ms;
        }

        .metric-btn.active {
            border-color: var(--border-color);
            background: var(--bg-main);
        }

        /* 图表预览 */
        .chart-container {
            height: 260px;
            position: relative;
            background-image: 
                linear-gradient(to bottom, transparent 0, transparent calc(25% - 1px), rgba(128,128,128,0.1) calc(25% - 1px), rgba(128,128,128,0.1) 25%, transparent 25%), 
                linear-gradient(to bottom, transparent 0, transparent calc(50% - 1px), rgba(128,128,128,0.1) calc(50% - 1px), rgba(128,128,128,0.1) 50%, transparent 50%), 
                repeating-linear-gradient(to right, transparent 0, transparent 80px, rgba(128,128,128,0.05) 80px, rgba(128,128,128,0.05) 81px);
        }

        /* 汇总统计 */
        .summary-bar {
            padding: 0.75rem 1rem;
            border-top: 2px solid var(--border-color);
            display: flex;
            gap: 2rem;
            font-size: 10px;
            font-weight: 900;
            background: var(--bg-surface);
        }

        .summary-label { opacity: 0.5; margin-right: 0.5rem; }
    </style>
</head>
<body>

    <div class="mb-10 max-w-4xl">
        <h1 class="text-2xl font-black uppercase mb-2">Usage Dashboard</h1>
        <p class="text-[11px] opacity-60 leading-relaxed uppercase tracking-widest">
            Full-featured integrated console redesign encompassing all existing controls.
        </p>
    </div>

    <div class="max-w-5xl">
        <div class="console-panel">
            <!-- 1. 状态条 (涵盖 Action Message 和 Rebuild 按钮) -->
            <div class="console-status-bar">
                <div class="status-pill">
                    <div class="status-dot"></div>
                    <span>Projected Usage: Index Ready</span>
                </div>
                
                <div class="action-group">
                    <button class="action-btn">Refresh</button>
                    <button class="action-btn" style="border-right:0">Rebuild</button>
                </div>
            </div>

            <!-- 2. 控制条 (涵盖 Range 切换 和 Metric 切换) -->
            <div class="console-controls">
                <div class="segmented-control">
                    <div class="segment active">Today</div>
                    <div class="segment">7D</div>
                    <div class="segment">14D</div>
                    <div class="segment">30D</div>
                    <div class="segment">All</div>
                </div>
                
                <div class="flex items-center px-4 bg-[var(--bg-surface)] border-l-2 border-[var(--border-color)]">
                    <div class="metric-switcher border-2 border-[var(--border-color)]">
                        <button class="metric-btn active">Tokens</button>
                        <button class="metric-btn">Requests</button>
                    </div>
                </div>
            </div>

            <!-- 3. 图表主体 -->
            <div class="chart-container">
                <svg viewBox="0 0 1000 260" preserveAspectRatio="none" class="h-full w-full">
                    <path d="M0,200 Q150,150 300,180 T600,100 T1000,50 L1000,260 L0,260 Z" fill="rgba(0,0,0,0.05)" />
                    <path d="M0,200 Q150,150 300,180 T600,100 T1000,50" fill="none" stroke="var(--border-color)" stroke-width="3" />
                </svg>
            </div>

            <!-- 4. 汇总统计 (原 UsageChartCard 内部汇总) -->
            <div class="summary-bar">
                <div><span class="summary-label">TOTAL:</span> 2,451,092 TOKENS</div>
                <div><span class="summary-label">INPUT:</span> 1,020,400</div>
                <div><span class="summary-label">OUTPUT:</span> 1,430,692</div>
                <div class="ml-auto text-[var(--accent-red)] italic">0.02s LATENCY</div>
            </div>
        </div>
    </div>

</body>
</html>
